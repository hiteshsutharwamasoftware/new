name: Verity Codex Use-Case Generation

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Optional scope (e.g., 'checkout journey')"
        required: false
        default: ""
      callback_url:
        description: "Verity callback URL override (optional)"
        required: false
        default: ""
      verity_project_id:
        description: "Verity project id override (optional)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: verity-usecase-generation-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  usecases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Missing required secret OPENAI_API_KEY" >&2
            exit 1
          fi
          if [ -z "${{ secrets.VERITY_PROJECT_TOKEN }}" ]; then
            echo "Missing required secret VERITY_PROJECT_TOKEN" >&2
            exit 1
          fi

      - name: Detect GitHub App write-token config
        id: gh_write_cfg
        env:
          VERITY_GITHUB_APP_ID: ${{ secrets.VERITY_GITHUB_APP_ID }}
          VERITY_GITHUB_APP_PRIVATE_KEY: ${{ secrets.VERITY_GITHUB_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$VERITY_GITHUB_APP_ID" ] && [ -n "$VERITY_GITHUB_APP_PRIVATE_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve GitHub write token (optional GitHub App)
        id: gh_write_token
        if: ${{ steps.gh_write_cfg.outputs.enabled == 'true' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VERITY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VERITY_GITHUB_APP_PRIVATE_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install YAML parser
        run: python -m pip install --upgrade pip pyyaml

      - name: Load .verity/config.yml
        id: cfg
        run: |
          python - <<'PY' > /tmp/verity-callback.json
          import os
          from pathlib import Path
          import yaml

          cfg = yaml.safe_load(Path('.verity/config.yml').read_text()) or {}
          verity = cfg.get('verity', {}) or {}
          callback_override = os.environ.get("VERITY_CALLBACK_OVERRIDE", "").strip()
          project_override = os.environ.get("VERITY_PROJECT_OVERRIDE", "").strip()
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as f:
            f.write(f"project_id={project_override or str(verity.get('project_id', '')).strip()}\n")
            f.write(f"callback_url={callback_override or str(verity.get('callback_url', '')).strip()}\n")
          PY
        env:
          VERITY_CALLBACK_OVERRIDE: ${{ inputs.callback_url }}
          VERITY_PROJECT_OVERRIDE: ${{ inputs.verity_project_id }}

      - name: Notify Verity - started
        continue-on-error: true
        env:
          VERITY_PROJECT_TOKEN: ${{ secrets.VERITY_PROJECT_TOKEN }}
          VERITY_PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
          VERITY_CALLBACK_URL: ${{ steps.cfg.outputs.callback_url }}
        run: |
          if [ -z "$VERITY_CALLBACK_URL" ] || [ "$VERITY_CALLBACK_URL" = "https://69b5-2409-40d4-1069-ba9f-4c2d-f04a-3d4f-4457.ngrok-free.app/api/callbacks/github-actions" ]; then
            echo "Skipping callback: callback URL not configured"
            exit 0
          fi
          python - <<'PY' > /tmp/verity-callback.json
          import json, os
          payload = {
            "event": "workflow_started",
            "project_id": os.environ.get("VERITY_PROJECT_ID"),
            "repo": os.environ.get("GITHUB_REPOSITORY"),
            "workflow": os.environ.get("GITHUB_WORKFLOW"),
            "run_id": os.environ.get("GITHUB_RUN_ID"),
            "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
            "run_url": f"https://github.com/{os.environ.get('GITHUB_REPOSITORY')}/actions/runs/{os.environ.get('GITHUB_RUN_ID')}",
          }
          print(json.dumps(payload))
          PY
          curl -sS -X POST "$VERITY_CALLBACK_URL" \
            -H "Authorization: Bearer $VERITY_PROJECT_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/verity-callback.json || true

      - name: Render prompt
        run: |
          cat .github/codex/prompts/usecase-generation.md > codex-prompt.md
          if [ -n "${{ inputs.scope }}" ]; then
            echo "" >> codex-prompt.md
            echo "## Scope" >> codex-prompt.md
            echo "" >> codex-prompt.md
            echo "${{ inputs.scope }}" >> codex-prompt.md
          fi

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.VERITY_CODEX_MODEL != '' && vars.VERITY_CODEX_MODEL || 'gpt-5' }}
          prompt-file: codex-prompt.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
          allow-bots: true
          codex-args: '["--full-auto"]'

      - name: Sync docs context (auto document mode)
        run: python scripts/sync_repo_docs.py

      - name: Extract generated stories
        id: extract_stories
        run: |
          python - <<'PY' > /tmp/verity-callback.json
          import json
          import os
          import re
          from pathlib import Path

          def normalize(value: str) -> str:
            return re.sub(r"\s+", " ", (value or "")).strip()

          def infer_tags(title: str, description: str):
            haystack = f"{title} {description}".lower()
            mapping = [
              ("auth", "auth"),
              ("login", "auth"),
              ("checkout", "checkout"),
              ("payment", "payments"),
              ("search", "search"),
              ("admin", "admin"),
              ("settings", "settings"),
              ("deploy", "deploy"),
              ("test", "testing")
            ]
            tags = []
            for needle, tag in mapping:
              if needle in haystack and tag not in tags:
                tags.append(tag)
            return tags

          path = Path("docs/use-cases.md")
          text = path.read_text(encoding="utf-8") if path.exists() else ""

          stories = []
          sections = re.split(r"(?m)^\s*###\s+", text)
          for raw in sections[1:]:
            lines = raw.splitlines()
            if not lines:
              continue
            title = normalize(lines[0])
            body_lines = [line.rstrip() for line in lines[1:]]
            description_parts = []
            criteria = []
            in_criteria = False
            for line in body_lines:
              stripped = line.strip()
              if not stripped:
                continue
              markerless = normalize(re.sub(r"^(?:[-*]|\d+\.)\s*", "", stripped))
              if re.match(r"(?i)^acceptance criteria:?$", markerless):
                in_criteria = True
                continue
              is_bullet = bool(re.match(r"^(?:[-*]|\d+\.)\s+", stripped))
              if in_criteria and is_bullet:
                criteria.append(markerless)
                continue
              if in_criteria and not is_bullet:
                in_criteria = False
              description_parts.append(markerless)

            description = normalize(" ".join(description_parts))
            if title:
              stories.append({
                "title": title,
                "description": description,
                "acceptanceCriteria": criteria,
                "priority": "medium",
                "tags": infer_tags(title, description)
              })

          if not stories:
            for line in text.splitlines():
              match = re.match(r"^\s*(?:[-*]|\d+[.)])\s*(As\b.+)$", line, re.IGNORECASE)
              if not match:
                continue
              title = normalize(match.group(1))
              stories.append({
                "title": title[:180],
                "description": title,
                "acceptanceCriteria": [],
                "priority": "medium",
                "tags": infer_tags(title, title)
              })

          stories = stories[:20]
          Path("generated-stories.json").write_text(json.dumps(stories, indent=2), encoding="utf-8")

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as handle:
            handle.write("generated_stories<<EOF\n")
            handle.write(json.dumps(stories, separators=(",", ":")))
            handle.write("\nEOF\n")
            handle.write(f"generated_story_count={len(stories)}\n")
          PY

      - name: Create PR
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.gh_write_token.outputs.token || secrets.VERITY_GITHUB_WRITE_TOKEN || github.token }}
          commit-message: "docs(verity): update use cases"
          branch: verity/codex-usecases-${{ github.run_id }}
          delete-branch: true
          title: "Verity: update use cases"
          body: |
            Automated use case updates generated by Verity/Codex.
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## Codex summary
            ${{ steps.run_codex.outputs.final-message }}
          labels: "verity:agent,verity:docs"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verity-usecase-generation
          path: |
            codex-output.md
            codex-prompt.md
            generated-stories.json
          if-no-files-found: ignore

      - name: Notify Verity - completed
        if: always()
        continue-on-error: true
        env:
          VERITY_PROJECT_TOKEN: ${{ secrets.VERITY_PROJECT_TOKEN }}
          VERITY_PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
          VERITY_CALLBACK_URL: ${{ steps.cfg.outputs.callback_url }}
          JOB_STATUS: ${{ job.status }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_CREATE_OUTCOME: ${{ steps.cpr.outcome }}
          PR_BRANCH: verity/codex-usecases-${{ github.run_id }}
          ARTIFACT_NAME: verity-usecase-generation
          GENERATED_STORIES_JSON: ${{ steps.extract_stories.outputs.generated_stories }}
          GENERATED_STORY_COUNT: ${{ steps.extract_stories.outputs.generated_story_count }}
        run: |
          if [ -z "$VERITY_CALLBACK_URL" ] || [ "$VERITY_CALLBACK_URL" = "https://69b5-2409-40d4-1069-ba9f-4c2d-f04a-3d4f-4457.ngrok-free.app/api/callbacks/github-actions" ]; then
            echo "Skipping callback: callback URL not configured"
            exit 0
          fi
          python - <<'PY' > /tmp/verity-callback.json
          import json
          import os

          generated_stories = []
          raw_stories = os.environ.get("GENERATED_STORIES_JSON", "")
          if raw_stories:
            try:
              parsed = json.loads(raw_stories)
              if isinstance(parsed, list):
                generated_stories = parsed
            except Exception:
              generated_stories = []

          payload = {
            "event": "workflow_completed",
            "project_id": os.environ.get("VERITY_PROJECT_ID"),
            "repo": os.environ.get("GITHUB_REPOSITORY"),
            "workflow": os.environ.get("GITHUB_WORKFLOW"),
            "run_id": os.environ.get("GITHUB_RUN_ID"),
            "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
            "run_url": f"https://github.com/{os.environ.get('GITHUB_REPOSITORY')}/actions/runs/{os.environ.get('GITHUB_RUN_ID')}",
            "status": os.environ.get("JOB_STATUS"),
            "pr_number": os.environ.get("PR_NUMBER") or None,
            "pr_url": os.environ.get("PR_URL") or None,
            "pr_branch": os.environ.get("PR_BRANCH") or None,
            "pr_create_outcome": os.environ.get("PR_CREATE_OUTCOME") or None,
            "artifact_name": os.environ.get("ARTIFACT_NAME") or None,
            "codex_final_message": (os.environ.get("CODEX_FINAL_MESSAGE") or "")[:20000],
            "generated_story_count": int(os.environ.get("GENERATED_STORY_COUNT") or 0),
            "generated_stories": generated_stories,
          }
          print(json.dumps(payload))
          PY
          curl -sS -X POST "$VERITY_CALLBACK_URL" \
            -H "Authorization: Bearer $VERITY_PROJECT_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/verity-callback.json || true
